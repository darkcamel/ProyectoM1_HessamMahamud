<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paleta de Color</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script type="module" src="./js/main.js"></script>
</head>

<body>
    <!-- ==<título principal>== -->
    <header>
        <section class="header">
            <a href="index.html" class="logo" aria-label="Paleta de Colores - inicio">
                <img src="" />
                <span class="logo-texto"><strong>Clorify</strong></span>
            </a>
        </section>

        <section class="header">
            <h1>Paleta de Colores</h1>
            <p>Galería de colores listos para copiar y pegar</p>
        </section>

        <section class="header">
            <a href="https://github.com/darkcamel" target="_blank" rel="noopener noreferrer"
                aria-label="Ver perfil de GitHub" class="enlace-social">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
                    <path
                        d="M12 .5C5.65.5.5 5.65.5 12c0 5.09 3.29 9.4 7.86 10.93.57.1.78-.25.78-.55v-2.17c-3.2.7-3.88-1.36-3.88-1.36-.52-1.34-1.28-1.7-1.28-1.7-1.04-.72.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.72-1.54-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.24 2.76.12 3.05.74.81 1.18 1.84 1.18 3.1 0 4.43-2.7 5.4-5.27 5.68.42.36.78 1.07.78 2.16v3.2c0 .3.2.66.79.55A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z" />
                </svg>
            </a>
            <a href="https://linkedin.com/in/TU-USUARIO" target="_blank" rel="noopener noreferrer"
                aria-label="Ver perfil de LinkedIn" class="enlace-social">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
                    <path
                        d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.86 0-2.15 1.45-2.15 2.94v5.67H9.35V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.59 0 4.26 2.36 4.26 5.43v6.31ZM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12ZM7.12 20.45H3.56V9h3.56v11.45Z" />
                </svg>
            </a>
        </section>
    </header>

    <!-- ==<contenedor principal>== -->
    <main class="app-layout">

        <!-- ==<panel de control izquierda>== -->
        <section class="panel-control">
            <h2>Configuración de paleta</h2>

            <!-- ==<selector tamaño paleta>== -->
            <section class="grupo-controles">
                <label for="tamano-paleta">Tamaño paleta</label>
                <select id="tamano-paleta" name="tamano-paleta">
                    <option value="6">6 colores</option>
                    <option value="8">8 colores</option>
                    <option value="9">9 colores</option>
                </select>
                <label for="formato-color">Formato</label>
                <select id="formato-color" name="formato-color">
                    <option>HEX</option>
                    <option>RGB</option>
                </select>
            </section>

            <!-- ==<boton generar paleta>== --> <!-- From Uiverse.io by augustin_4687 -->
            <button class="button" id="generar-paleta">
                <div class="contenedor-button">
                    <div>
                        <div>Generar paleta nueva</div>
                    </div>
                </div>
            </button>

            <!-- ==<panel colores guardados>== -->
            <div class="colores-guardados-panel">
                <h3>Colores guardados</h3>
                <div>
                    <button class="boton-secundario" id="guardar-paleta" type="button">
                        Guardar paleta
                    </button>
                    <button class="boton-secundario" id="cargar-paleta" type="button">
                        Cargar paleta guardada
                    </button>
                </div>
                <div class="lista-colores-guardados" id="lista-colores-guardados" aria-live="polite">
                    <!--js pinta colores guardados-->
                </div>
            </div>
        </section>

        <!-- ==<paleta de colores>== -->
        <section class="panel-paleta" aria-labelledby="titulo-paleta">
            <div class="cuadricula-paleta" id="contenedor-paleta">
                <!--acá JS crea el contenido-->
            </div>
        </section>
    </main>

    <!-------------------->
    <footer>
        <section>
            tttt
        </section>
    </footer>

    <!-- ==<toast>== -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>

</html>
