<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paleta de Color</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/script.js" defer></script>
</head>

<body>

    <!-- ==<título principal>== -->
    <header class="header">
        <h1>Paleta de Colores</h1>
        <p>Galería de colores listos para copiar y pegar</p>
    </header>

    <!-- ==<contenedor principal>== -->
    <main class="app-layout">

        <!-- ==<panel de control izquierda>== -->
        <section class="panel-control">
            <h2>Configuración de paleta</h2>

            <!-- ==<selector numero de colores paleta>== -->
            <div class="grupo-controles">
                <div class="selector-tamano">
                    <label for="tamano-paleta">Tamaño de la paleta</label>
                    <select id="tamano-paleta" name="tamano-paleta">
                        <option value="6">6 colores</option>
                        <option value="8">8 colores</option>
                        <option value="9">9 colores</option>
                    </select>
                </div>
            </div>

            <!-- From Uiverse.io by dexter-st -->
            <div class="btn-container">
                <div class="btn-drawer transition-top">expires in...</div>
                <div class="btn-drawer transition-bottom">...8 hours</div>

                <button class="btn" id="generar-paleta">
                    <span class="btn-text">Get Offer</span>
                </button>

                <svg class="btn-corner" xmlns="http://www.w3.org/2000/svg" viewBox="-1 1 32 32">
                    <path d="M32,32C14.355,32,0,17.645,0,0h.985c0,17.102,13.913,31.015,31.015,31.015v.985Z"></path>
                </svg>
                <svg class="btn-corner" xmlns="http://www.w3.org/2000/svg" viewBox="-1 1 32 32">
                    <path d="M32,32C14.355,32,0,17.645,0,0h.985c0,17.102,13.913,31.015,31.015,31.015v.985Z"></path>
                </svg>
                <svg class="btn-corner" xmlns="http://www.w3.org/2000/svg" viewBox="-1 1 32 32">
                    <path d="M32,32C14.355,32,0,17.645,0,0h.985c0,17.102,13.913,31.015,31.015,31.015v.985Z"></path>
                </svg>
                <svg class="btn-corner" xmlns="http://www.w3.org/2000/svg" viewBox="-1 1 32 32">
                    <path d="M32,32C14.355,32,0,17.645,0,0h.985c0,17.102,13.913,31.015,31.015,31.015v.985Z"></path>
                </svg>
            </div>

            <!-- <button class="boton" id="generar-paleta">Genera paleta de colores</button> -->
            <!-- más adelante acá va microfeedback, etc. -->
        </section>

        <!-- ==<paleta de colores>== -->
        <section class="panel-paleta" aria-labelledby="titulo-paleta">
            <h2 id="titulo-paleta">Paleta de colores generada</h2>
            <div class="cuadricula-paleta" id="contenedor-paleta">
                <!--acá JS crea el contenido-->
            </div>
        </section>
    </main>

    <!-------------------->
    <footer>

    </footer>

    <!-- ==<toast>== -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>

</html>
