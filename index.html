<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paleta de Color</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="./js/script.js" defer></script>
</head>

<body>
    <!-- ==<título principal>== -->
    <header>
        <section class="header">
            logo...
        </section>
        <section class="header">
            <h1>Paleta de Colores</h1>
            <p>Galería de colores listos para copiar y pegar</p>
        </section>
        <section class="header">
            social...
        </section>
    </header>

    <!-- ==<contenedor principal>== -->
    <main class="app-layout">

        <!-- ==<panel de control izquierda>== -->
        <section class="panel-control">
            <h2>Configuración de paleta</h2>

            <!-- ==<selector tamaño paleta>== -->
            <section class="grupo-controles">
                <label for="tamano-paleta">Tamaño paleta</label>
                <select id="tamano-paleta" name="tamano-paleta">
                    <option value="6">6 colores</option>
                    <option value="8">8 colores</option>
                    <option value="9">9 colores</option>
                </select>
                <label for="formato-color">Formato</label>
                <select id="formato-color" name="formato-color">
                    <option>HEX</option>
                    <option>HSL</option>
                    <option>RGB</option>
                </select>
            </section>

            <!-- ==<boton generar paleta>== --> <!-- From Uiverse.io by augustin_4687 -->
            <button class="button" id="generar-paleta">
                <div class="contenedor-button">
                    <div>
                        <div>Generar paleta nueva</div>
                    </div>
                </div>
            </button>

            <!-- ==<panel colores guardados>== -->
            <div class="colores-guardados-panel">
                <h3>Colores guardados</h3>
                <button class="boton-secundario" id="guardar-bloqueados" type="button">
                    Guardar colores bloqueados
                </button>
                <div class="lista-colores-guardados" id="lista-colores-guardados" aria-live="polite">
                    <!--js pinta colores guardados-->
                </div>
            </div>
        </section>

        <!-- ==<paleta de colores>== -->
        <section class="panel-paleta" aria-labelledby="titulo-paleta">
            <h2 id="titulo-paleta">Paleta de colores generada</h2>
            <div class="cuadricula-paleta" id="contenedor-paleta">
                <!--acá JS crea el contenido-->
            </div>
        </section>
    </main>

    <!-------------------->
    <footer>
        <section>
            tttt
        </section>
    </footer>

    <!-- ==<toast>== -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>

</html>
